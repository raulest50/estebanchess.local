services:
  app:
    build:
      context: .
    image: chess-move-analyzer:local
    environment:
      CHESS_ANALYZER_HOST: 0.0.0.0
      CHESS_ANALYZER_PORT: 8080
      CHESS_ANALYZER_SHOW: "false"
      STOCKFISH_PATH: /usr/local/bin/stockfish
    ports:
      - "8080:8080"
    volumes:
      - chess_analysis_data:/app/data
    restart: unless-stopped

  app-mdns-linux:
    profiles:
      - mdns-linux
    build:
      context: .
    image: chess-move-analyzer:local
    network_mode: host
    environment:
      CHESS_ANALYZER_HOST: 0.0.0.0
      CHESS_ANALYZER_PORT: 8080
      CHESS_ANALYZER_SHOW: "false"
      STOCKFISH_PATH: /usr/local/bin/stockfish
      ENABLE_MDNS: "1"
      MDNS_HOSTNAME: estebanchess
    volumes:
      - chess_analysis_data:/app/data
    restart: unless-stopped

volumes:
  chess_analysis_data:
